name = "road-distance-proxy"
main = "index.js"
compatibility_date = "2024-09-23"

# Deploy steps:
#   1. npx wrangler kv:namespace create RATE_KV
#      → copy the returned id into kv_namespaces below
#   2. npx wrangler secret put ORS_API_KEY
#   3. npx wrangler secret put ADMIN_SECRET      ← random string, used by admin dashboard
#   4. npx wrangler secret put STRIPE_SECRET_KEY ← sk_live_… from Stripe dashboard
#   5. npx wrangler secret put STRIPE_WEBHOOK_SECRET ← from Stripe webhook settings
#   6. npx wrangler secret put STRIPE_PRICE_ID   ← price_… monthly price ID
#   7. npx wrangler deploy
#   8. Copy the *.workers.dev URL into config.json → "proxyUrl"

[[kv_namespaces]]
binding = "RATE_KV"
id = "6dc1db1a086b47899ae990fb0c5be8a0"

[[d1_databases]]
binding = "DB"
database_name = "road-distance-users"
database_id = "a815a37f-e115-4c0e-a182-2f7cb3ec0a44"
