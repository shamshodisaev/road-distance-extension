<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      width: 310px;
      padding: 18px 16px 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #212529;
      background: #fff;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 600;
    }

    .sub {
      margin: 0 0 16px;
      font-size: 12px;
      color: #6c757d;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 9px;
      background: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #0b5ed7; }
    button:active { background: #0a58ca; }

    /* Registration banner */
    .reg-banner {
      background: #fff8e1;
      border: 1px solid #ffd54f;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .reg-banner strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .reg-banner p {
      margin: 0 0 10px;
      font-size: 12px;
      color: #555;
      line-height: 1.5;
    }

    .reg-banner button {
      margin-top: 0;
      background: #f59e0b;
    }

    .reg-banner button:hover { background: #d97706; }

    /* Registered badge */
    .reg-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #198754;
      margin-bottom: 14px;
      padding: 6px 8px;
      background: #d1e7dd;
      border-radius: 6px;
    }

    .reg-badge .check { font-size: 13px; }
  </style>
</head>
<body>
  <h1>Cursus</h1>
  <p class="sub">Powered by OpenRouteService</p>

  <!-- Shown when not registered -->
  <div id="reg-banner" class="reg-banner" style="display:none">
    <strong>Setup required</strong>
    <p>Complete a quick one-time registration to activate the extension.</p>
    <button id="open-reg">Complete setup</button>
  </div>

  <!-- Shown when registered -->
  <div id="reg-badge" class="reg-badge" style="display:none">
    <span class="check">&#10003;</span>
    <span id="reg-email"></span>
  </div>


  <script src="popup.js"></script>
</body>
</html>
