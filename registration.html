<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursus — Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      color: #e2e8f0;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 14px;
      padding: 44px 40px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.4px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.4px;
    }

    .sub {
      margin: 0 0 28px;
      font-size: 13px;
      color: #8b949e;
      line-height: 1.6;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
    }

    input[type="email"],
    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #30363d;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #e2e8f0;
      background: #0d1117;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 18px;
      outline: none;
    }

    input::placeholder { color: #484f58; }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
      letter-spacing: 0.01em;
    }

    .btn:hover:not(:disabled) { opacity: 0.88; }
    .btn:active:not(:disabled) { transform: scale(0.99); }
    .btn:disabled { opacity: 0.45; cursor: default; }

    .error {
      margin-top: 12px;
      font-size: 12px;
      color: #f87171;
      text-align: center;
      min-height: 18px;
    }

    /* Success */
    .success {
      text-align: center;
      padding: 12px 0 4px;
    }

    .success-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(34,197,94,0.12);
      border: 1.5px solid rgba(34,197,94,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 24px;
      color: #22c55e;
    }

    .success h2 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }

    .success p {
      margin: 0;
      color: #8b949e;
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">C</div>
      <span class="logo-text">Cursus</span>
    </div>

    <div id="form-view">
      <h1>Get started</h1>
      <p class="sub">One-time setup to activate the extension.</p>

      <label for="email">Work email <span style="color:#f87171">*</span></label>
      <input type="email" id="email" placeholder="you@mail.com" autocomplete="email" required />

      <label for="company">Company <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#484f58">(optional)</span></label>
      <input type="text" id="company" placeholder="Acme Freight" autocomplete="organization" />

      <button id="submit-btn" class="btn">Activate Cursus</button>
      <div class="error" id="error"></div>
    </div>

    <div id="success-view" style="display:none" class="success">
      <div class="success-icon">&#10003;</div>
      <h2>You're all set</h2>
      <p>Cursus is active and ready.<br />You can close this tab.</p>
    </div>
  </div>

  <script src="registration.js"></script>
</body>
</html>
